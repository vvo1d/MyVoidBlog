{% extends "base.html" %}

{% block title %}Загрузка изображений — {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<h1>Загрузка изображений</h1>

<div class="upload-page">
    <div id="upload-zone" class="upload-zone">
        <p>Перетащите изображения сюда или нажмите для выбора</p>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple hidden>
    </div>

    <div id="upload-results" class="upload-results"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const zone = document.getElementById('upload-zone');
    const input = document.getElementById('file-input');
    const results = document.getElementById('upload-results');

    zone.addEventListener('click', () => input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));

    zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    });

    input.addEventListener('change', () => handleFiles(input.files));

    function handleFiles(files) {
        Array.from(files).forEach(file => {
            const fd = new FormData();
            fd.append('file', file);
            fetch('{{ url_for("admin.upload") }}', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        addResult(file.name, null, data.error);
                    } else {
                        addResult(file.name, data.url);
                    }
                })
                .catch(() => addResult(file.name, null, 'Ошибка загрузки'));
        });
    }

    function addResult(name, url, error) {
        const div = document.createElement('div');
        div.className = 'upload-result';
        if (error) {
            div.innerHTML = `<span class="text-error">${name}: ${error}</span>`;
        } else {
            const md = `![${name}](${url})`;
            div.innerHTML = `
                <img src="${url}" class="upload-thumb" alt="${name}">
                <code class="upload-md" onclick="navigator.clipboard.writeText(this.textContent)">${md}</code>
                <span class="text-muted">Нажмите, чтобы скопировать</span>
            `;
        }
        results.prepend(div);
    }
</script>
{% endblock %}
