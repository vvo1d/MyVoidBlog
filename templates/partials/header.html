<header class="site-header">
    <div class="container header-inner">
        <a href="{{ url_for('public.index') }}" class="site-logo">{{ config.SITE_NAME }}</a>
        <nav class="site-nav">
            <a href="{{ url_for('public.index') }}">Посты</a>
            <a href="{{ url_for('public.tags_page') }}">Теги</a>
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('admin.dashboard') }}">Админка</a>
            <a href="{{ url_for('admin.logout') }}">Выйти</a>
            {% endif %}
            <div class="nav-search" id="nav-search">
                <button class="nav-search-toggle" id="search-toggle" aria-label="Поиск">&#128269;</button>
                <div class="nav-search-dropdown" id="search-dropdown">
                    <input type="text" id="search-input" placeholder="Поиск..." autocomplete="off">
                    <div class="search-results" id="search-results"></div>
                </div>
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <span class="icon-moon">&#9789;</span>
                <span class="icon-sun">&#9788;</span>
            </button>
        </nav>
    </div>
</header>

<script>
(function() {
    var toggle = document.getElementById('search-toggle');
    var dropdown = document.getElementById('search-dropdown');
    var input = document.getElementById('search-input');
    var results = document.getElementById('search-results');
    var timer;

    toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('active');
        if (dropdown.classList.contains('active')) {
            input.focus();
        } else {
            input.value = '';
            results.innerHTML = '';
            results.classList.remove('active');
        }
    });

    input.addEventListener('input', function() {
        clearTimeout(timer);
        var q = input.value.trim();
        if (q.length < 2) { results.innerHTML = ''; results.classList.remove('active'); return; }
        timer = setTimeout(function() {
            fetch('/search?q=' + encodeURIComponent(q))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.length) {
                    results.innerHTML = '<div class="search-empty">Ничего не найдено</div>';
                    results.classList.add('active');
                    return;
                }
                results.innerHTML = data.map(function(p) {
                    return '<a href="' + p.url + '" class="search-result-item">' +
                        '<strong>' + escapeHtml(p.title) + '</strong>' +
                        '<span>' + escapeHtml(p.summary) + '</span>' +
                        '</a>';
                }).join('');
                results.classList.add('active');
            });
        }, 300);
    });

    // Close on click outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#nav-search')) {
            dropdown.classList.remove('active');
            input.value = '';
            results.innerHTML = '';
            results.classList.remove('active');
        }
    });

    // Close on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            dropdown.classList.remove('active');
            input.value = '';
            results.innerHTML = '';
            results.classList.remove('active');
        }
    });

    function escapeHtml(t) {
        var d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }
})();
</script>
